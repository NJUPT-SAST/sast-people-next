name: Deploy

# ============================================================================
# Docker Build + SCP + SSH Deployment (SOP-compliant)
# ============================================================================
# Manual trigger only (workflow_dispatch).
# Requires the following secrets:
#   - SERVER_HOST:     Target server IP/hostname
#   - SERVER_USER:     SSH user
#   - SSH_PRIVATE_KEY: SSH private key for authentication
# ============================================================================

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SERVICE_NAME: sast-people-next
  REGISTRY_PREFIX: sast
  TAR_FILE_NAME: new_image.tar
  TAR_ZST_FILE_NAME: new_image.tar.zst

jobs:
  quality:
    name: Quality Check
    uses: ./.github/workflows/quality.yml

  test:
    name: Test Suite
    needs: quality
    uses: ./.github/workflows/test.yml

  deploy:
    name: Docker Build & Deploy
    needs: [quality, test]
    runs-on: ubuntu-latest
    if: '!cancelled() && !failure()'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Get short Git commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=./${{ env.TAR_FILE_NAME }}

      - name: Check image tar size before compression
        run: |
          echo "Image archive before compression:"
          ls -lh ${{ env.TAR_FILE_NAME }}
          du -h ${{ env.TAR_FILE_NAME }}

      - name: Install zstd if needed
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y zstd
          fi
          zstd --version

      - name: Compress image tar with zstd
        run: |
          zstd -T0 -10 --force --verbose ${{ env.TAR_FILE_NAME }} -o ${{ env.TAR_ZST_FILE_NAME }}
          echo "Image archive after compression:"
          ls -lh ${{ env.TAR_FILE_NAME }} ${{ env.TAR_ZST_FILE_NAME }}
          du -h ${{ env.TAR_FILE_NAME }} ${{ env.TAR_ZST_FILE_NAME }}
          rm -f ${{ env.TAR_FILE_NAME }}

      - name: Transfer files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "${{ env.TAR_ZST_FILE_NAME }},docker-compose.yml"
          target: /data/${{ env.SERVICE_NAME }}/

      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            SERVICE_DIR="/data/${{ env.SERVICE_NAME }}"
            IMAGE_NAME="${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}"
            TAR_ZST_FILE="${{ env.TAR_ZST_FILE_NAME }}"
            NEW_VERSION_TAG="${{ steps.vars.outputs.sha_short }}"

            cd ${SERVICE_DIR}

            echo "=========================================="
            echo "Deploying version: ${NEW_VERSION_TAG}"
            echo "=========================================="

            echo ""
            echo "[1/7] Checking zstd availability..."
            if ! command -v zstd >/dev/null 2>&1; then
              echo "zstd is not installed on the server."
              echo "Please install it once with: sudo apt install -y zstd"
              exit 1
            fi
            zstd --version

            echo ""
            echo "[2/7] Loading image from ${TAR_ZST_FILE}..."
            zstd -dc ${TAR_ZST_FILE} | docker load

            echo ""
            echo "[3/7] Rotating image tags..."
            if docker image inspect "${IMAGE_NAME}:current" >/dev/null 2>&1; then
              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo "  Removing old backup image..."
                docker rmi "${IMAGE_NAME}:backup"
              fi
              echo "  Tagging current as backup..."
              docker tag "${IMAGE_NAME}:current" "${IMAGE_NAME}:backup"
            else
              echo "  First deployment, skipping backup rotation"
            fi

            echo "  Tagging new image (${NEW_VERSION_TAG}) as current..."
            docker tag "${IMAGE_NAME}:${NEW_VERSION_TAG}" "${IMAGE_NAME}:current"

            echo ""
            echo "[4/7] Writing .env from GitHub Secrets..."
            cat > .env << 'DOTENV'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SESSION_SECRET=${{ secrets.SESSION_SECRET }}
            LINK_CLIENT_ID=${{ secrets.LINK_CLIENT_ID }}
            LINK_CLIENT_SECRET=${{ secrets.LINK_CLIENT_SECRET }}
            APP_ID=${{ secrets.APP_ID }}
            APP_SECRET=${{ secrets.APP_SECRET }}
            DOTENV
            chmod 600 .env

            echo ""
            echo "[5/7] Starting service..."
            docker compose up -d --remove-orphans

            echo ""
            echo "[6/7] Health check (timeout: 120s)..."
            HEALTHY=0
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' sast-people-next 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=1
                echo "  [$i/24] Service is healthy!"
                break
              fi
              echo "  [$i/24] status=$STATUS, waiting 5s..."
              sleep 5
            done

            if [ $HEALTHY -eq 0 ]; then
              echo ""
              echo "=========================================="
              echo "!! HEALTH CHECK FAILED -- ROLLING BACK !!"
              echo "=========================================="
              echo ""
              echo "--- Last 40 lines of container logs ---"
              docker logs --tail 40 sast-people-next || true
              echo "----------------------------------------"
              echo "--- Health check diagnostics ---"
              docker inspect --format='{{json .State.Health}}' sast-people-next 2>/dev/null || echo "(inspect failed)"
              echo ""
              echo "--- Direct health test inside container ---"
              docker exec sast-people-next wget -O /dev/null http://127.0.0.1:3003/health 2>&1 || true
              echo "----------------------------------------"

              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo ""
                echo "Rolling back to backup image..."
                docker tag "${IMAGE_NAME}:backup" "${IMAGE_NAME}:current"
                docker compose up -d --remove-orphans

                echo "Waiting for rollback to stabilize..."
                sleep 10
                ROLLBACK_STATUS=$(docker inspect --format='{{.State.Health.Status}}' sast-people-next 2>/dev/null || echo "unknown")
                echo "Rollback health status: $ROLLBACK_STATUS"
              else
                echo "No backup image found -- cannot rollback!"
              fi

              echo ""
              echo "Removing failed image..."
              docker rmi "${IMAGE_NAME}:${NEW_VERSION_TAG}" || true

              echo ""
              echo "DEPLOY FAILED. Rolled back to previous version."
              exit 1
            fi

            echo ""
            echo "[7/7] Cleaning up..."
            rm -f ${TAR_ZST_FILE}
            docker rmi "${IMAGE_NAME}:latest"

            echo "  Pruning old version images (keep latest 3)..."
            docker image ls --format '{{.Tag}}' "${IMAGE_NAME}" \
              | grep -v -E '^(current|backup|latest)$' \
              | tail -n +4 \
              | xargs -r -I {} docker rmi "${IMAGE_NAME}:{}"
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "Deploy complete. Running version: ${NEW_VERSION_TAG}"
            echo "=========================================="
