name: Deploy

# ============================================================================
# Docker Build + SCP + SSH Deployment
# ============================================================================
# Triggers on push to master (after CI passes) or manual dispatch.
# Requires the following secrets:
#   - SERVER_HOST:     Target server IP/hostname
#   - SERVER_USER:     SSH user
#   - SSH_PRIVATE_KEY: SSH private key for authentication
# ============================================================================

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SERVICE_NAME: sast-people-next
  REGISTRY_PREFIX: sast
  TAR_FILE_NAME: new_image.tar

jobs:
  quality:
    name: Quality Check
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/quality.yml

  test:
    name: Test Suite
    if: github.event_name == 'workflow_dispatch'
    needs: quality
    uses: ./.github/workflows/test.yml

  deploy:
    name: Docker Build & Deploy
    needs: [quality, test]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && !cancelled() && !failure())

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short Git commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export image to tar
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:latest
            ${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}:${{ steps.vars.outputs.sha_short }}
          outputs: type=docker,dest=./${{ env.TAR_FILE_NAME }}

      - name: Transfer files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: |
            ${{ env.TAR_FILE_NAME }}
            docker-compose.yml
          target: /data/${{ env.SERVICE_NAME }}/

      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            SERVICE_DIR="/data/${{ env.SERVICE_NAME }}"
            IMAGE_NAME="${{ env.REGISTRY_PREFIX }}/${{ env.SERVICE_NAME }}"
            TAR_FILE="${{ env.TAR_FILE_NAME }}"
            NEW_VERSION_TAG="${{ steps.vars.outputs.sha_short }}"

            cd ${SERVICE_DIR}

            echo "=========================================="
            echo "Deploying version: ${NEW_VERSION_TAG}"
            echo "=========================================="

            echo ""
            echo "[1/5] Loading new image from ${TAR_FILE}..."
            docker load -i ${TAR_FILE}

            echo ""
            echo "[2/5] Rotating image tags..."
            if docker image inspect "${IMAGE_NAME}:current" >/dev/null 2>&1; then
              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo "  Removing old backup image..."
                docker rmi "${IMAGE_NAME}:backup"
              fi
              echo "  Tagging current as backup..."
              docker tag "${IMAGE_NAME}:current" "${IMAGE_NAME}:backup"
            else
              echo "  First deployment, skipping backup rotation"
            fi

            echo "  Tagging new image (${NEW_VERSION_TAG}) as current..."
            docker tag "${IMAGE_NAME}:${NEW_VERSION_TAG}" "${IMAGE_NAME}:current"

            echo ""
            echo "[3/5] Starting service..."
            docker compose up -d --remove-orphans

            echo ""
            echo "[4/5] Health check (timeout: 120s)..."
            HEALTHY=0
            for i in $(seq 1 24); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' sast-people-next 2>/dev/null || echo "starting")
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=1
                echo "  [$i/24] Service is healthy!"
                break
              fi
              echo "  [$i/24] status=$STATUS, waiting 5s..."
              sleep 5
            done

            if [ $HEALTHY -eq 0 ]; then
              echo ""
              echo "=========================================="
              echo "!! HEALTH CHECK FAILED -- ROLLING BACK !!"
              echo "=========================================="
              echo ""
              echo "--- Last 40 lines of container logs ---"
              docker logs --tail 40 sast-people-next || true
              echo "----------------------------------------"

              if docker image inspect "${IMAGE_NAME}:backup" >/dev/null 2>&1; then
                echo ""
                echo "Rolling back to backup image..."
                docker tag "${IMAGE_NAME}:backup" "${IMAGE_NAME}:current"
                docker compose up -d --remove-orphans

                echo "Waiting for rollback to stabilize..."
                sleep 10
                ROLLBACK_STATUS=$(docker inspect --format='{{.State.Health.Status}}' sast-people-next 2>/dev/null || echo "unknown")
                echo "Rollback health status: $ROLLBACK_STATUS"
              else
                echo "No backup image found -- cannot rollback!"
              fi

              echo ""
              echo "Removing failed image..."
              docker rmi "${IMAGE_NAME}:${NEW_VERSION_TAG}" || true

              echo ""
              echo "DEPLOY FAILED. Rolled back to previous version."
              exit 1
            fi

            echo ""
            echo "[5/5] Cleaning up..."
            rm ${TAR_FILE}
            docker rmi "${IMAGE_NAME}:latest"
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "Deploy complete. Running version: ${NEW_VERSION_TAG}"
            echo "=========================================="
