# Dependabot configuration file
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # JavaScript/TypeScript dependencies (npm/pnpm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "npm"
    groups:
      runtime-minor-patch:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "zustand"
          - "axios"
          - "date-fns"
          - "dayjs"
          - "jose"
          - "swr"
          - "lucide-react"
          - "@radix-ui/*"
          - "radix-ui"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
          - "next-themes"
          - "sonner"
        update-types:
          - "minor"
          - "patch"
      dev-tooling-minor-patch:
        patterns:
          - "@types/*"
          - "eslint*"
          - "typescript"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "shadcn"
          - "tw-animate-css"
          - "cross-env"
          - "concurrently"
          - "drizzle-kit"
        update-types:
          - "minor"
          - "patch"
      test-tooling-minor-patch:
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "ts-jest"
          - "ts-node"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "zod"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "drizzle-orm"
      - dependency-name: "drizzle-kit"
      - dependency-name: "inngest"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@hookform/resolvers"
        update-types:
          - "version-update:semver-major"
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
