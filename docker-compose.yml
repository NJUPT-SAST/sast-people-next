services:
  sast-people-next:
    image: sast/sast-people-next:current
    container_name: sast-people-next
    ports:
      - "3003:3003"
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      APP_ID: ""
      APP_SECRET: ""
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
