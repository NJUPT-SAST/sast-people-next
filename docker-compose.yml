services:
  sast-people:
    image: sast/sast-people:current
    container_name: sast-people
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000',function(r){process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
