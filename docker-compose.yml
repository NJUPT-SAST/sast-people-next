services:
  sast-people-next:
    image: sast/sast-people-next:current
    container_name: sast-people-next
    ports:
      - "3003:3003"
    restart: unless-stopped
    environment:
      APP_ID: ""
      APP_SECRET: ""
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health',function(r){process.exit(r.statusCode===200?0:1)})"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
